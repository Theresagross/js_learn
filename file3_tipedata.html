<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Tipe Data</title>
</head>
<body>
    <script>
        document.write("Tipe Data dalam JavaScript");
        document.write("<br>");
        document.write("1. String: 'Hello', \"World\"");
        document.write("<br>");
        document.write("2. Number: 42, 3.14");
        document.write("<br>");
        document.writeln(100);

        document.write("<br>");
        document.write("Number Notation:");
        document.write("<br>");
        document.write("Hexadecimal: 0xFF");
        document.write("<br>"); 
        document.write("Octal: 0o77");
        document.write("<br>");
        document.write("Binary: 0b1010<br>");
        document.writeln(0b1100110);
        // nama saya :
        document.writeln("Nama saya : " + "Fathurrahman Amin");
        document.write("<br>");

        
    </script>
    
</body>
</html>
