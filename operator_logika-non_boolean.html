<html>
<body> 
    <h1>Operator Logika Non Boolean</h1>
    <script>
        // operator logika non boolean
        // &&, ||, !

        const nilai = 80;
        const nilai2 = 90;

        const result = nilai > 75 && nilai2 > 75;
        document.writeln(`Result : ${result} <br>`);

        const result2 = nilai > 75 || nilai2 > 75;
        document.writeln(`Result2 : ${result2} <br>`);

        const result3 = !(nilai > 75);
        document.writeln(`Result3 : ${result3} <br>`);

    </script>
</body>
</html>
